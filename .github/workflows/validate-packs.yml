name: validate-packs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --frozen

      - name: Validate every pack in packs/
        run: |
          set -e
          for pack in packs/*/; do
            echo "==> $pack"
            uv run myvoice pack validate "$pack"
          done
