name: api-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check packages/api

      - name: Mypy (types)
        run: uv run mypy packages/api

      - name: Pytest
        run: uv run pytest packages/api -v
